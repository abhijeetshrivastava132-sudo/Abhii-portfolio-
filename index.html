<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhii Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0a0a0a;
  color:#eaeaea;
  font-family:'Courier New',Monospace;
  overflow:hidden;
}

/* NAVBAR */
.navbar{
  position:absolute;
  top:-80px;
  width:100%;
  display:flex;
  justify-content:center;
  transition:0.8s;
}
.show-navbar{top:25px;}

.nav-box{
  display:flex;
  gap:25px;
  padding:12px 30px;
  border-radius:40px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(16px);
  box-shadow:0 0 30px rgba(255,0,60,0.08);
}

.nav-box a{
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}
.nav-box a:hover{color:crimson;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#typing{
  font-size:30px;
  line-height:1.5;
  letter-spacing:0.5px;
}

/* CURSOR */
.cursor{
  display:inline-block;
  width:2px;
  height:1em;
  background:#fff;
  margin-left:4px;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0;}}

/* ICONS */
.icons{
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
  opacity:0;
  transition:1.5s;
}
.show-icons{opacity:1;}
.icons i{
  margin:0 14px;
  font-size:22px;
  color:#777;
  cursor:pointer;
  transition:0.3s;
}
.icons i:hover{
  color:crimson;
  transform:translateY(-3px);
}

/* SECTIONS */
.section{
  display:none;
  position:absolute;
  top:18%;
  width:100%;
  text-align:center;
  padding:0 30px;
}
.section.show{display:block;}

.section h2{
  font-size:32px;
  margin-bottom:25px;
}

/* ABOUT */
#about-text{
  font-size:16px;
  line-height:1.8;
  max-width:600px;
  margin:auto;
  text-align:left;
}

/* CONTACT */
.contact-form{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:280px;
  margin:20px auto;
}
.contact-form input,
.contact-form textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.02);
  color:white;
  outline:none;
  transition:0.3s;
}
.contact-form input:focus,
.contact-form textarea:focus{
  border:1px solid crimson;
  box-shadow:0 0 10px rgba(255,0,60,0.3);
}
.contact-form button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:crimson;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.contact-form button:hover{
  transform:scale(1.05);
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}
.popup.show{
  opacity:1;
  pointer-events:auto;
}
.popup-box{
  background:#111;
  padding:30px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 0 40px rgba(255,0,60,0.2);
}
.popup-box button{
  margin-top:15px;
  padding:10px 22px;
  border:none;
  border-radius:10px;
  background:crimson;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar" id="navbar">
  <div class="nav-box">
    <a onclick="goHome()">Home</a>
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('projects')">Projects</a>
    <a onclick="showSection('contact')">Contact</a>
  </div>
</div>

<div class="hero">
  <div id="typing"></div>
</div>

<div class="icons" id="icons">
  <i class="fa-brands fa-instagram" onclick="openLink('https://instagram.com/ft.abh1i')"></i>
  <i class="fa-brands fa-whatsapp" onclick="openLink('https://wa.me/919631192011')"></i>
  <i class="fa-brands fa-snapchat" onclick="openLink('https://snapchat.com/x.idfc')"></i>
</div>

<!-- ABOUT -->
<div id="about" class="section">
  <h2>About Me</h2>
  <p id="about-text"></p>
</div>

<div id="projects" class="section">
  <h2>Projects</h2>
  <p>Coming soon...</p>
</div>

<div id="contact" class="section">
  <h2>Contact Me</h2>
  <form id="contact-form" class="contact-form">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Project Details" required></textarea>
    <button type="submit">Send</button>
  </form>
</div>

<div id="popup" class="popup">
  <div class="popup-box">
    <h2>Message Sent</h2>
    <button onclick="goHomeFromPopup()">Home</button>
  </div>
</div>

<script>
const roles = [
  "I build websites",
  "clean UI",
  "smoot UX"
];

let roleIndex = 0;
let charIndex = 0;
let deleting = false;

function typeEffect() {
  let current = roles[roleIndex];
  let text = current.substring(0, charIndex);

  document.getElementById("typing").innerHTML =
    `Hi, I'm <span style="color:crimson;">Abhii</span><br>` +
    text +
    `<span class="cursor"></span>`;

  if (!deleting && charIndex < current.length) {
    charIndex++;
    setTimeout(typeEffect, 70);
  } 
  else if (deleting && charIndex > 0) {
    charIndex--;
    setTimeout(typeEffect, 35);
  } 
  else {
    deleting = !deleting;
    if (!deleting) roleIndex = (roleIndex + 1) % roles.length;
    setTimeout(typeEffect, deleting ? 1200 : 400);
  }

  document.getElementById("navbar").classList.add("show-navbar");
  document.getElementById("icons").classList.add("show-icons");
}
typeEffect();

// ABOUT
let aboutText = `I'm Abhii — a self-driven web creator.
I build minimal, smooth, and clean websites that feel premium without unnecessary complexity.
Focused on design, performance, and constant improvement.
Learning, experimenting, and turning ideas into real projects every day.`;

let j = 0;
function typeAbout() {
  let display = aboutText.substring(0, j + 1);
  j++;
  display = display.replace(/\n/g, "<br><br>");

  document.getElementById("about-text").innerHTML =
    display + "<span class='cursor'></span>";

  if (j < aboutText.length) {
    setTimeout(typeAbout, 40);
  }
}

// NAV
function showSection(id){
  document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("show"));
  document.querySelector(".hero").style.display="none";
  document.getElementById("icons").style.display="none";

  document.getElementById(id).classList.add("show");

  if(id==="about"){
    j=0;
    typeAbout();
  }
}

function goHome(){
  document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("show"));
  document.querySelector(".hero").style.display="flex";
  document.getElementById("icons").style.display="block";
}

function openLink(url){
  window.open(url,"_blank");
}

// FORM
const form=document.getElementById("contact-form");

form.addEventListener("submit", async function(e){
  e.preventDefault();
  const data=new FormData(form);

  try{
    const res=await fetch("https://formspree.io/f/xyklvzld",{
      method:"POST",
      body:data,
      headers:{'Accept':'application/json'}
    });

    if(res.ok){
      form.reset();
      document.getElementById("popup").classList.add("show");
    }
  }catch{
    alert("Error");
  }
});

function goHomeFromPopup(){
  document.getElementById("popup").classList.remove("show");
  goHome();
}
</script>

</body>
</html>
